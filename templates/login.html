<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesión - Biblioteca</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light d-flex align-items-center" style="min-height: 100vh;">
    <main class="container" style="max-width: 430px;">
        <div class="card shadow-sm border-0">
            <div class="card-body p-4">
                <h1 class="h4 text-center mb-3">📚 Sistema de Biblioteca</h1>
                <p class="text-center text-secondary mb-4">Inicia sesión como administrador o encargado.</p>

                <form method="post" novalidate>
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label" for="id_username">Usuario</label>
                        <input class="form-control" id="id_username" type="text" name="username" required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label" for="id_password">Contraseña</label>
                        <input class="form-control" id="id_password" type="password" name="password" required>
                    </div>
                    <button class="btn btn-primary w-100" type="submit">Ingresar</button>
                </form>
            </div>
        </div>
    </main>
</body>

</html>
